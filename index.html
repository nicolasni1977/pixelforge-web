<script>
(function() {
    'use strict';

    // === STATE ===
    const state = {
        documentName: 'Untitled-1',
        hasUnsavedChanges: false,
        activeTool: 'brush',
        activeLayerIndex: 0,
        zoom: 1.0,
        panX: 0,
        panY: 0,
        fgColor: '#000000',
        bgColor: '#ffffff',
        fgColorIndex: 0,
        bgColorIndex: 15,
        brushSize: 10,
        brushOpacity: 100,
        brushHardness: 100,
        tolerance: 32,
        layers: [],
        history: [],
        historyIndex: -1,
        showGrid: false,
        documentWidth: 800,
        documentHeight: 600,
        selection: null,
        isPanning: false,
        isDrawing: false,
        isSelecting: false,
        lastPointerX: 0,
        lastPointerY: 0,
        panStartX: 0,
        panStartY: 0,
        panOffsetStartX: 0,
        panOffsetStartY: 0,
        drawStartX: 0,
        drawStartY: 0,
        clipboard: null,
        marqueePoints: [],
        lassoPoints: [],
        cropStartX: 0,
        cropStartY: 0,
        cropEndX: 0,
        cropEndY: 0,
        textValue: '',
        isSpacePressed: false,
        spaceDownTime: 0,
        eyedropperMode: false
    };

    const TOOL_NAMES = {
        move: 'Move', brush: 'Brush', pencil: 'Pencil', eraser: 'Eraser',
        spray: 'Spray', fill: 'Fill', text: 'Text', marquee: 'Marquee',
        lasso: 'Lasso', wand: 'Magic Wand', crop: 'Crop'
    };

    const TOOL_SHORTCUTS = {
        move: 'V', brush: 'B', pencil: 'N', eraser: 'E',
        spray: 'A', fill: 'G', text: 'T', marquee: 'M',
        lasso: 'L', wand: 'W', crop: 'C'
    };

    const COLORS = [
        '#000000','#434343','#666666','#999999','#b7b7b7','#cccccc','#d9d9d9','#ffffff',
        '#009999','#339966','#006666','#228833','#006600','#008080','#333399','#000066',
        '#CC0077','#800080','#FF6600','#FF3333','#CC0000','#FF9999','#FFCC00','#CC6600',
        '#FF8888','#FFFF66','#FF6600','#CC0033','#FF0033','#660066','#CC0099','#0066CC',
        '#0033CC','#0099FF','#6666CC','#0099CC','#6600CC','#CC0099','#9933CC','#CC66FF',
        '#FF66FF','#FF99CC','#CC66FF','#9900CC','#660099','#330066','#006699','#003366',
        '#000099','#000033','#000000','#4d4d4d','#999999','#cccccc','#e6e6e6','#ffffff'
    ];

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    let displayCanvas, displayCtx;
    let canvasWorkspace, canvasContainer, rulerTop, rulerLeft;
    let rulerTicksTop, rulerTicksLeft;
    let layerList, historyList, colorPalette;

    // === INITIALIZATION ===
    function init() {
        displayCanvas = $('#displayCanvas');
        displayCtx = displayCanvas.getContext('2d', { willReadFrequently: true });
        canvasWorkspace = $('#canvasWorkspace');
        canvasContainer = $('#canvasContainer');
        rulerTop = $('#rulerTop');
        rulerLeft = $('#rulerLeft');
        rulerTicksTop = $('#rulerTicksTop');
        rulerTicksLeft = $('#rulerTicksLeft');
        layerList = $('#layerList');
        historyList = $('#historyList');
        colorPalette = $('#colorPalette');

        // Check for auto-save first before creating new document
        const autoSaved = tryLoadAutoSave();

        if (!autoSaved) {
            newDocument(800, 600);
        }

        buildColorPalette();
        setupEventListeners();
        renderAll();
        fitToWindow();
        buildMobileToolbar();
    }

    // === DOCUMENT MANAGEMENT ===
    // FIX MAJ-003: saveHistory moved AFTER layers.push and activeLayerIndex assignment
    function newDocument(width, height) {
        state.documentWidth = width;
        state.documentHeight = height;
        state.activeLayerIndex = 0;
        state.layers = [];
        state.history = [];
        state.historyIndex = -1;
        state.hasUnsavedChanges = true;
        state.selection = null;
        state.documentName = 'Untitled-1';
        state.zoom = 1;
        state.panX = 0;
        state.panY = 0;

        const layer = createLayer('Background', width, height);
        const ctx = layer.canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);

        state.layers.push(layer);
        state.activeLayerIndex = 0;
        saveHistory('New Document');

        $('#docName').textContent = state.documentName;
        updateUnsavedIndicator();
    }

    function createLayer(name, w, h) {
        const canvas = document.createElement('canvas');
        canvas.width = w || state.documentWidth;
        canvas.height = h || state.documentHeight;
        return {
            name: name || 'Layer',
            canvas: canvas,
            visible: true,
            opacity: 1.0,
            locked: false
        };
    }

    function addLayer() {
        // Compute a unique-ish display name based on the current layer count
        const layer = createLayer('Layer ' + (state.layers.length + 1), state.documentWidth, state.documentHeight);
        // Insert above the currently active layer, make the new layer active
        const insertAt = state.activeLayerIndex + 1;
        state.layers.splice(insertAt, 0, layer);
        state.activeLayerIndex = insertAt;
        state.hasUnsavedChanges = true;
        // Snapshot AFTER the splice so undo restores [..., NewLayer (empty)] not [..., (no NewLayer)].
        // Without this, a brush stroke on the new layer would undo back to before the layer existed.
        saveHistory('Add Layer');
        renderAll();
    }

    function deleteLayer() {
        if (state.layers.length <= 1) {
            showToast('Cannot delete the last layer', 'error');
            return;
        }
        saveHistory('Delete Layer');
        state.layers.splice(state.activeLayerIndex, 1);
        if (state.activeLayerIndex >= state.layers.length) {
            state.activeLayerIndex = state.layers.length - 1;
        }
        state.hasUnsavedChanges = true;
        renderAll();
    }

    function duplicateLayer() {
        const src = state.layers[state.activeLayerIndex];
        const dup = createLayer(src.name + ' copy', state.documentWidth, state.documentHeight);
        dup.canvas.getContext('2d').drawImage(src.canvas, 0, 0);
        saveHistory('Duplicate Layer');
        state.layers.splice(state.activeLayerIndex + 1, 0, dup);
        state.activeLayerIndex++;
        state.hasUnsavedChanges = true;
        renderAll();
    }

    function mergeDown() {
        if (state.activeLayerIndex >= state.layers.length - 1) {
            showToast('Nothing to merge down', 'info');
            return;
        }
        const active = state.layers[state.activeLayerIndex];
        const below = state.layers[state.activeLayerIndex + 1];
        const ctx = below.canvas.getContext('2d');
        ctx.globalAlpha = active.opacity;
        ctx.drawImage(active.canvas, 0, 0);
        ctx.globalAlpha = 1.0;
        saveHistory('Merge Down');
        state.layers.splice(state.activeLayerIndex, 1);
        state.hasUnsavedChanges = true;
        renderAll();
    }

    function flattenImage() {
        const flat = createLayer('Background', state.documentWidth, state.documentHeight);
        const ctx = flat.canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, state.documentWidth, state.documentHeight);
        for (let i = state.layers.length - 1; i >= 0; i--) {
            if (state.layers[i].visible) {
                ctx.globalAlpha = state.layers[i].opacity;
                ctx.drawImage(state.layers[i].canvas, 0, 0);
            }
        }
        ctx.globalAlpha = 1.0;
        saveHistory('Flatten Image');
        state.layers = [flat];
        state.activeLayerIndex = 0;
        state.hasUnsavedChanges = true;
        renderAll();
    }

    function toggleLayerVisibility(index) {
        state.layers[index].visible = !state.layers[index].visible;
        state.hasUnsavedChanges = true;
        renderAll();
        updateLayerList();
    }

    function setLayerOpacity(index, opacity) {
        state.layers[index].opacity = opacity / 100;
        state.hasUnsavedChanges = true;
        renderAll();
    }

    function reorderLayers(fromIndex, toIndex) {
        const item = state.layers.splice(fromIndex, 1)[0];
        state.layers.splice(toIndex, 0, item);
        if (state.activeLayerIndex === fromIndex) {
            state.activeLayerIndex = toIndex;
        } else if (fromIndex < state.activeLayerIndex && toIndex >= state.activeLayerIndex) {
            state.activeLayerIndex--;
        } else if (fromIndex > state.activeLayerIndex && toIndex <= state.activeLayerIndex) {
            state.activeLayerIndex++;
        }
        state.hasUnsavedChanges = true;
        renderAll();
        updateLayerList();
    }

    function getActiveLayer() {
        return state.layers[state.activeLayerIndex];
    }

    // === HISTORY ===
    function saveHistory(label) {
        const snapshot = state.layers.map(l => {
            const copy = createLayer(l.name, l.canvas.width, l.canvas.height);
            copy.visible = l.visible;
            copy.opacity = l.opacity;
            copy.canvas.getContext('2d').drawImage(l.canvas, 0, 0);
            return copy;
        });

        state.history.splice(state.historyIndex + 1);
        state.history.push({ label: label, layers: snapshot });

        if (state.history.length > 50) {
            state.history.shift();
        }

        state.historyIndex = state.history.length - 1;
        renderHistoryList();
    }

    function undo() {
        if (state.historyIndex <= 0) {
            showToast('Nothing to undo', 'info');
            return;
        }
        state.historyIndex--;
        restoreHistory();
        showToast('Undo: ' + state.history[state.historyIndex].label, 'info');
    }

    function redo() {
        if (state.historyIndex >= state.history.length - 1) {
            showToast('Nothing to redo', 'info');
            return;
        }
        state.historyIndex++;
        restoreHistory();
        showToast('Redo: ' + state.history[state.historyIndex].label, 'info');
    }

    function restoreHistory() {
        const snapshot = state.history[state.historyIndex];
        state.layers = snapshot.layers.map(l => {
            const copy = createLayer(l.name, l.canvas.width, l.canvas.height);
            copy.visible = l.visible;
            copy.opacity = l.opacity;
            copy.canvas.getContext('2d').drawImage(l.canvas, 0, 0);
            return copy;
        });
        if (state.activeLayerIndex >= state.layers.length) {
            state.activeLayerIndex = state.layers.length - 1;
        }
        state.hasUnsavedChanges = true;
        renderAll();
        updateLayerList();
        updateUnsavedIndicator();
    }

    function tryLoadAutoSave() {
        try {
            const saved = localStorage.getItem('pixelforge-autosave');
            if (saved) {
                const data = JSON.parse(saved);
                if (data.layers && data.layers.length > 0) {
                    if (confirm('Restore auto-saved document?')) {
                        restoreFromJSON(data);
                        renderAll();
                        fitToWindow();
                        showToast('Auto-saved document restored', 'success');
                        return true;
                    }
                }
            }
        } catch (e) {
            // ignore
        }
        return false;
    }

    // === COLOR SYSTEM ===
    function buildColorPalette() {
        colorPalette.innerHTML = '';
        COLORS.forEach((color, i) => {
            const swatch = document.createElement('div');
            swatch.className = 'color-palette__swatch';
            swatch.style.background = color;
            swatch.dataset.color = color;
            swatch.dataset.index = i;
            swatch.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                setFGColor(color);
                setFGIndex(i);
                updateFgBgWells();
            });
            colorPalette.appendChild(swatch);
        });
        updateFgBgWells();
    }

    function setFGColor(color) {
        state.fgColor = color;
        state.eyedropperMode = false;
        canvasWorkspace.style.cursor = 'crosshair';
        updateFgBgWells();
    }

    function setBGColor(color) {
        state.bgColor = color;
        updateFgBgWells();
    }

    function setFGIndex(i) { state.fgColorIndex = i; }
    function setBGIndex(i) { state.bgColorIndex = i; }

    function swapColors() {
        const tempColor = state.fgColor;
        const tempIndex = state.fgColorIndex;
        state.fgColor = state.bgColor;
        state.fgColorIndex = state.bgColorIndex;
        state.bgColor = tempColor;
        state.bgColorIndex = tempIndex;
        updateFgBgWells();
    }

    function resetColors() {
        state.fgColor = '#000000';
        state.bgColor = '#ffffff';
        state.fgColorIndex = 0;
        state.bgColorIndex = 15;
        updateFgBgWells();
    }

    function updateFgBgWells() {
        $('#fgSwatch').style.background = state.fgColor;
        $('#bgSwatch').style.background = state.bgColor;
        $('#colorPicker').value = state.fgColor;
        $('#hexInput').value = state.fgColor;
        $$('.color-palette__swatch').forEach(s => {
            s.classList.toggle('color-palette__swatch--active', s.dataset.color === state.fgColor);
        });
        $('#fgWell').style.background = 'repeating-conic-gradient(var(--color-rules) 0% 25%, var(--color-background) 0% 50%) 0 0 / 8px 8px';
        $('#fgSwatch').style.background = state.fgColor;
        $('#fgWell').classList.add('color-well--active');
        $('#bgWell').classList.remove('color-well--active');
    }

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
    }

    function getColorAt(ctx, x, y) {
        const data = ctx.getImageData(x, y, 1, 1).data;
        return { r: data[0], g: data[1], b: data[2], a: data[3] };
    }

    function rgbToHex(r, g, b) {
        return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
    }

    // === TOOLS ===
    function setTool(tool) {
        state.activeTool = tool;
        if (state.eyedropperMode) {
            state.eyedropperMode = false;
            canvasWorkspace.style.cursor = 'crosshair';
        }
        $$('.tool-btn').forEach(btn => {
            const isActive = btn.dataset.tool === tool;
            btn.classList.toggle('tool-btn--active', isActive);
            btn.setAttribute('aria-pressed', isActive);
        });
        $('#statusTool').textContent = TOOL_NAMES[tool];
        updateCursor();
        updateToolOptions();
        // Don't auto-clear an active selection when switching tools — the user
        // makes a selection precisely so they can then paint/erase/fill within
        // it. Selection is cleared explicitly via Esc, Ctrl+D, or deselectAll().
        // Clear only the in-progress crop scratch state.
        if (tool !== 'crop') {
            state.cropStartX = 0;
            state.cropStartY = 0;
        }
    }

    function updateCursor() {
        if (state.eyedropperMode) {
            canvasWorkspace.style.cursor = 'crosshair';
        } else if (state.activeTool === 'move') {
            canvasWorkspace.style.cursor = 'grab';
        } else {
            canvasWorkspace.style.cursor = 'crosshair';
        }
    }

    function updateToolOptions() {
        const brush = ['brush', 'pencil', 'eraser', 'spray'];
        const toleranceTools = ['fill', 'wand'];
        $('#toolOptionBrushSize').style.display = brush.includes(state.activeTool) ? 'flex' : 'none';
        $('#toolOptionBrushOpacity').style.display = brush.includes(state.activeTool) ? 'flex' : 'none';
        $('#toolOptionBrushHardness').style.display = brush.includes(state.activeTool) ? 'flex' : 'none';
        $('#toolOptionTolerance').style.display = toleranceTools.includes(state.activeTool) ? 'flex' : 'none';
    }

    function getCanvasCoords(clientX, clientY) {
        const rect = canvasWorkspace.getBoundingClientRect();
        const innerX = clientX - rect.left;
        const innerY = clientY - rect.top;
        const docX = (innerX - 18 - state.panX) / state.zoom;
        const docY = (innerY - 18 - state.panY) / state.zoom;
        return { x: Math.floor(docX), y: Math.floor(docY) };
    }

    // Apply the active selection as a clip on `ctx`. Caller must `ctx.save()` before
    // and `ctx.restore()` after. No-op if no selection is active.
    function clipToSelection(ctx) {
        const sel = state.selection;
        if (!sel) return;
        ctx.beginPath();
        if (sel.points && sel.points.length >= 3) {
            // Lasso polygon
            ctx.moveTo(sel.points[0].x, sel.points[0].y);
            for (let i = 1; i < sel.points.length; i++) {
                ctx.lineTo(sel.points[i].x, sel.points[i].y);
            }
            ctx.closePath();
        } else if (sel.minX !== undefined) {
            // Rectangular marquee
            ctx.rect(sel.minX, sel.minY, sel.maxX - sel.minX, sel.maxY - sel.minY);
        } else {
            return;
        }
        ctx.clip();
    }

    // Pixel-level point-in-selection test (used by floodFill / putImageData paths
    // where ctx.clip() does not apply). Returns true when no selection is active.
    function isInsideSelection(x, y) {
        const sel = state.selection;
        if (!sel) return true;
        if (sel.points && sel.points.length >= 3) {
            // Ray-cast even-odd point-in-polygon
            let inside = false;
            const pts = sel.points;
            for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
                const xi = pts[i].x, yi = pts[i].y;
                const xj = pts[j].x, yj = pts[j].y;
                const intersect = ((yi > y) !== (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-9) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
        if (sel.minX !== undefined) {
            return x >= sel.minX && x < sel.maxX && y >= sel.minY && y < sel.maxY;
        }
        return true;
    }

    function applyBrush(x, y) {
        const layer = getActiveLayer();
        if (!layer || !layer.visible) return;
        const ctx = layer.canvas.getContext('2d');
        const color = hexToRgb(state.fgColor);
        const opacity = state.brushOpacity / 100;

        // If a selection exists, constrain all paint/erase ops to its area.
        ctx.save();
        clipToSelection(ctx);

        if (state.activeTool === 'brush' || state.activeTool === 'eraser') {
            const isEraser = state.activeTool === 'eraser';
            const size = state.brushSize;
            const hardness = state.brushHardness / 100;

            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.globalAlpha = opacity;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = opacity;
            }

            if (hardness < 1.0) {
                const gradient = ctx.createRadialGradient(x, y, size * hardness, x, y, size);
                gradient.addColorStop(0, 'rgba(' + color.r + ',' + color.g + ',' + color.b + ',1)');
                gradient.addColorStop(hardness, 'rgba(' + color.r + ',' + color.g + ',' + color.b + ',' + opacity + ')');
                gradient.addColorStop(1, 'rgba(' + color.r + ',' + color.g + ',' + color.b + ',0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = isEraser ? 'rgba(0,0,0,' + opacity + ')' : 'rgba(' + color.r + ',' + color.g + ',' + color.b + ',' + opacity + ')';
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            if (isEraser) {
                ctx.globalCompositeOperation = 'source-over';
            }
            ctx.globalAlpha = 1.0;
        } else if (state.activeTool === 'pencil') {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = state.fgColor;
            ctx.fillRect(x, y, 1, 1);
            if (state.brushSize > 1) {
                for (let dx = -Math.floor(state.brushSize/2); dx <= Math.floor(state.brushSize/2); dx++) {
                    for (let dy = -Math.floor(state.brushSize/2); dy <= Math.floor(state.brushSize/2); dy++) {
                        if (dx*dx + dy*dy <= Math.pow(state.brushSize/2, 2)) {
                            ctx.fillRect(x + dx, y + dy, 1, 1);
                        }
                    }
                }
            }
        } else if (state.activeTool === 'spray') {
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = opacity;
            const density = state.brushSize * 2;
            for (let i = 0; i < density; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * state.brushSize;
                const sx = x + Math.cos(angle) * radius;
                const sy = y + Math.sin(angle) * radius;
                ctx.fillStyle = 'rgba(' + color.r + ',' + color.g + ',' + color.b + ',' + (Math.random() * opacity) + ')';
                ctx.fillRect(sx, sy, 1, 1);
            }
            ctx.globalAlpha = 1.0;
        }

        ctx.restore();
    }

    // FIX MIN-001: Flood fill uses Int32Array head-pointer stack instead of queue.shift()
    function floodFill(startX, startY) {
        const layer = getActiveLayer();
        if (!layer) return;
        const ctx = layer.canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, state.documentWidth, state.documentHeight);
        const data = imageData.data;
        const w = state.documentWidth;
        const h = state.documentHeight;

        if (startX < 0 || startX >= w || startY < 0 || startY >= h) return;

        const targetIdx = (startY * w + startX) * 4;
        const targetR = data[targetIdx];
        const targetG = data[targetIdx + 1];
        const targetB = data[targetIdx + 2];
        const targetA = data[targetIdx + 3];

        const fillColor = hexToRgb(state.fgColor);

        if (targetR === fillColor.r && targetG === fillColor.g && targetB === fillColor.b && targetA === 255) return;

        const tolerance = state.tolerance;
        const visited = new Uint8Array(w * h);
        const stack = new Int32Array(w * h * 2);
        let sp = 0;
        stack[sp++] = startX;
        stack[sp++] = startY;

        while (sp > 0) {
            sp -= 2;
            const cx = stack[sp];
            const cy = stack[sp + 1];
            const idx = cy * w + cx;

            if (visited[idx]) continue;

            const pi = idx * 4;
            const pr = data[pi];
            const pg = data[pi + 1];
            const pb = data[pi + 2];
            const pa = data[pi + 3];

            if (Math.abs(pr - targetR) > tolerance ||
                Math.abs(pg - targetG) > tolerance ||
                Math.abs(pb - targetB) > tolerance) {
                continue;
            }

            visited[idx] = 1;
            // If a selection is active, only modify pixels inside it.
            // Neighbors are still enqueued so the flood traverses the boundary edge
            // and stops cleanly when it leaves the selection.
            if (isInsideSelection(cx, cy)) {
                data[pi] = fillColor.r;
                data[pi + 1] = fillColor.g;
                data[pi + 2] = fillColor.b;
                data[pi + 3] = 255;
            }

            if (cx > 0) { stack[sp++] = cx - 1; stack[sp++] = cy; }
            if (cx < w - 1) { stack[sp++] = cx + 1; stack[sp++] = cy; }
            if (cy > 0) { stack[sp++] = cx; stack[sp++] = cy - 1; }
            if (cy < h - 1) { stack[sp++] = cx; stack[sp++] = cy + 1; }
        }

        ctx.putImageData(imageData, 0, 0);
        state.hasUnsavedChanges = true;
    }

    // FIX MIN-001: Magic wand also uses Int32Array stack
    function selectWithMagicWand(x, y) {
        const layer = getActiveLayer();
        if (!layer) return;
        const ctx = layer.canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, state.documentWidth, state.documentHeight);
        const data = imageData.data;
        const w = state.documentWidth;
        const h = state.documentHeight;

        if (x < 0 || x >= w || y < 0 || y >= h) return;

        const targetIdx = (y * w + x) * 4;
        const targetR = data[targetIdx];
        const targetG = data[targetIdx + 1];
        const targetB = data[targetIdx + 2];
        const tolerance = state.tolerance;

        let minX = x, minY = y, maxX = x, maxY = y;

        const visited = new Uint8Array(w * h);
        const stack = new Int32Array(w * h * 2);
        let sp = 0;
        stack[sp++] = x;
        stack[sp++] = y;

        while (sp > 0) {
            sp -= 2;
            const cx = stack[sp];
            const cy = stack[sp + 1];
            const idx = cy * w + cx;

            if (visited[idx]) continue;

            const pi = idx * 4;
            const pr = data[pi], pg = data[pi + 1], pb = data[pi + 2];

            if (Math.abs(pr - targetR) > tolerance ||
                Math.abs(pg - targetG) > tolerance ||
                Math.abs(pb - targetB) > tolerance) continue;

            visited[idx] = 1;
            if (cx < minX) minX = cx;
            if (cx > maxX) maxX = cx;
            if (cy < minY) minY = cy;
            if (cy > maxY) maxY = cy;

            if (cx > 0) { stack[sp++] = cx - 1; stack[sp++] = cy; }
            if (cx < w - 1) { stack[sp++] = cx + 1; stack[sp++] = cy; }
            if (cy > 0) { stack[sp++] = cx; stack[sp++] = cy - 1; }
            if (cy < h - 1) { stack[sp++] = cx; stack[sp++] = cy + 1; }
        }

        state.selection = {
            minX: minX,
            minY: minY,
            maxX: maxX,
            maxY: maxY,
            points: []
        };

        for (let i = 0; i < w * h; i++) {
            if (visited[i]) {
                const px = i % w;
                const py = Math.floor(i / w);
                const leftVisited = px > 0 && visited[i - 1];
                const rightVisited = px < w - 1 && visited[i + 1];
                const topVisited = py > 0 && visited[i - w];
                const bottomVisited = py < h - 1 && visited[i + w];

                if (!leftVisited || !rightVisited || !topVisited || !bottomVisited) {
                    state.selection.points.push({ x: px, y: py });
                }
            }
        }

        updateSelectionOverlay();
        updateStatusMetrics();
    }

    // === FILTERS ===
    // FIX CRIT-002: renderAll() added immediately after ctx.putImageData() for visible filter feedback
    function applyFilter(type, value) {
        const layer = getActiveLayer();
        if (!layer || !layer.visible) {
            showToast('No visible active layer', 'error');
            return;
        }

        const ctx = layer.canvas.getContext('2d');
        saveHistory('Filter: ' + type);

        const imageData = ctx.getImageData(0, 0, state.documentWidth, state.documentHeight);
        const data = imageData.data;
        const w = state.documentWidth;
        const h = state.documentHeight;

        switch (type) {
            case 'brightness': {
                const brightness = value;
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.min(255, Math.max(0, data[i] + brightness));
                    data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + brightness));
                    data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + brightness));
                }
                break;
            }
            case 'contrast': {
                const factor = (259 * (value + 255)) / (255 * (259 - value));
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = Math.min(255, Math.max(0, factor * (data[i] - 128) + 128));
                    data[i + 1] = Math.min(255, Math.max(0, factor * (data[i + 1] - 128) + 128));
                    data[i + 2] = Math.min(255, Math.max(0, factor * (data[i + 2] - 128) + 128));
                }
                break;
            }
            case 'blur': {
                if (value === 0) break;
                const tempData = new Uint8ClampedArray(data);
                const radius = Math.ceil(value / 3);
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        let r = 0, g = 0, b = 0, count = 0;
                        for (let dy = -radius; dy <= radius; dy++) {
                            for (let dx = -radius; dx <= radius; dx++) {
                                const nx = x + dx;
                                const ny = y + dy;
                                if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                    const ni = (ny * w + nx) * 4;
                                    r += tempData[ni];
                                    g += tempData[ni + 1];
                                    b += tempData[ni + 2];
                                    count++;
                                }
                            }
                        }
                        const pi = (y * w + x) * 4;
                        data[pi] = r / count;
                        data[pi + 1] = g / count;
                        data[pi + 2] = b / count;
                    }
                }
                break;
            }
            case 'sharpen': {
                if (value === 0) break;
                const strength = value / 100;
                const tempData = new Uint8ClampedArray(data);
                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        const pi = (y * w + x) * 4;
                        const center = 1 + 4 * strength;
                        const neg = strength / (1 + strength);

                        let r = data[pi] * center;
                        let g = data[pi + 1] * center;
                        let b = data[pi + 2] * center;

                        r -= tempData[((y) * w + x) * 4] * neg;
                        g -= tempData[((y) * w + x) * 4 + 1] * neg;
                        b -= tempData[((y) * w + x) * 4 + 2] * neg;

                        r -= tempData[((y - 1) * w + x) * 4] * neg;
                        g -= tempData[((y - 1) * w + x) * 4 + 1] * neg;
                        b -= tempData[((y - 1) * w + x) * 4 + 2] * neg;

                        r -= tempData[((y + 1) * w + x) * 4] * neg;
                        g -= tempData[((y + 1) * w + x) * 4 + 1] * neg;
                        b -= tempData[((y + 1) * w + x) * 4 + 2] * neg;

                        r -= tempData[((y) * w + x - 1) * 4] * neg;
                        g -= tempData[((y) * w + x - 1) * 4 + 1] * neg;
                        b -= tempData[((y) * w + x - 1) * 4 + 2] * neg;

                        r -= tempData[((y) * w + x + 1) * 4] * neg;
                        g -= tempData[((y) * w + x + 1) * 4 + 1] * neg;
                        b -= tempData[((y) * w + x + 1) * 4 + 2] * neg;

                        data[pi] = Math.min(255, Math.max(0, r));
                        data[pi + 1] = Math.min(255, Math.max(0, g));
                        data[pi + 2] = Math.min(255, Math.max(0, b));
                    }
                }
                break;
            }
            case 'grayscale': {
                for (let i = 0; i < data.length; i += 4) {
                    const gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                    data[i] = gray;
                    data[i + 1] = gray;
                    data[i + 2] = gray;
                }
                break;
            }
            case 'invert': {
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = 255 - data[i];
                    data[i + 1] = 255 - data[i + 1];
                    data[i + 2] = 255 - data[i + 2];
                }
                break;
            }
            case 'sepia': {
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i + 1], b = data[i + 2];
                    data[i] = Math.min(255, Math.max(0, 0.393 * r + 0.769 * g + 0.189 * b));
                    data[i + 1] = Math.min(255, Math.max(0, 0.349 * r + 0.686 * g + 0.168 * b));
                    data[i + 2] = Math.min(255, Math.max(0, 0.272 * r + 0.534 * g + 0.131 * b));
                }
                break;
            }
        }

        ctx.putImageData(imageData, 0, 0);
        // CRIT-002: Synchronous visible update immediately after filter application
        renderAll();
        state.hasUnsavedChanges = true;
        showToast(type.charAt(0).toUpperCase() + type.slice(1) + ' applied', 'success');
    }

    // === RENDERING ===
    // FIX CRIT-001: Canvas sized to viewport, not document dimensions
    function renderAll() {
        const vw = canvasWorkspace.clientWidth;
        const vh = canvasWorkspace.clientHeight;
        displayCanvas.width = vw;
        displayCanvas.height = vh;

        // Reset transform and clear to transparent (CSS checkerboard shows through)
        displayCtx.setTransform(1, 0, 0, 1, 0, 0);
        displayCtx.clearRect(0, 0, vw, vh);

        // Apply zoom/pan transform to map document coords to visible viewport
        displayCtx.setTransform(state.zoom, 0, 0, state.zoom, 18 + state.panX, 18 + state.panY);

        // White document base — ensures the document area is always opaque white
        // so transparent layers and the newly-added empty layer don't expose the
        // CSS checkerboard where the document should be.
        displayCtx.fillStyle = '#ffffff';
        displayCtx.fillRect(0, 0, state.documentWidth, state.documentHeight);

        // Draw layers on top of the white base
        for (let i = 0; i < state.layers.length; i++) {
            const layer = state.layers[i];
            if (layer.visible) {
                displayCtx.globalAlpha = layer.opacity;
                displayCtx.drawImage(layer.canvas, 0, 0);
            }
        }
        displayCtx.globalAlpha = 1.0;

        // Reset transform to device coords for overlays
        displayCtx.setTransform(1, 0, 0, 1, 0, 0);

        updateRulers();
        updateLayerList();
        updateStatusMetrics();
    }

    // FIX MAJ-001: drawCheckerboard function removed entirely; transparency shown via CSS

    function updateRulers() {
        // Grid layout sizes the ruler containers automatically; only regenerate ticks here.
        generateRulerTicks();
    }

    function generateRulerTicks() {
        const tickInterval = getTickInterval();
        // The display canvas draws the document at (18 + panX, 18 + panY) inside the
        // workspace. Ruler containers align with the workspace's left/top edge, so
        // ticks need the same 18px offset to line up with the document.
        const docOffset = 18;

        rulerTicksTop.innerHTML = '';
        for (let x = 0; x < state.documentWidth; x += tickInterval) {
            const screenPos = docOffset + x * state.zoom + state.panX;
            const tick = document.createElement('div');
            tick.className = 'ruler-tick ruler-tick--major';
            tick.style.cssText = 'left:' + screenPos + 'px;top:8px;width:1px;height:' + (x % (tickInterval * 5) === 0 ? 10 : 5) + 'px;';
            rulerTicksTop.appendChild(tick);

            if (x % (tickInterval * 5) === 0) {
                const label = document.createElement('span');
                label.style.cssText = 'position:absolute;left:' + screenPos + 'px;top:0;font-size:10px;color:var(--color-dim);transform:translateX(-50%);padding:0 4px;';
                label.textContent = x;
                rulerTicksTop.appendChild(label);
            }
        }

        rulerTicksLeft.innerHTML = '';
        for (let y = 0; y < state.documentHeight; y += tickInterval) {
            const screenPos = docOffset + y * state.zoom + state.panY;
            const tick = document.createElement('div');
            tick.className = 'ruler-tick ruler-tick--major';
            tick.style.cssText = 'top:' + screenPos + 'px;left:8px;height:1px;width:' + (y % (tickInterval * 5) === 0 ? 10 : 5) + 'px;';
            rulerTicksLeft.appendChild(tick);

            if (y % (tickInterval * 5) === 0) {
                const label = document.createElement('span');
                label.style.cssText = 'position:absolute;top:' + screenPos + 'px;left:0;font-size:10px;color:var(--color-dim);transform:translateY(-50%);padding:2px 0;white-space:nowrap;';
                label.textContent = y;
                rulerTicksLeft.appendChild(label);
            }
        }
    }

    function getTickInterval() {
        if (state.zoom >= 4) return 1;
        if (state.zoom >= 2) return 5;
        if (state.zoom >= 1) return 10;
        if (state.zoom >= 0.5) return 25;
        return 50;
    }

    // === UI UPDATES ===
    function updateLayerList() {
        layerList.innerHTML = '';
        for (let i = state.layers.length - 1; i >= 0; i--) {
            const layer = state.layers[i];
            const item = document.createElement('div');
            item.className = 'layer-item' + (i === state.activeLayerIndex ? ' layer-item--active' : '');
            item.draggable = true;
            item.dataset.index = i;

            const thumb = document.createElement('div');
            thumb.className = 'layer-thumb';
            thumb.style.background = 'repeating-conic-gradient(var(--color-rules) 0% 25%, var(--color-background) 0% 50%) 0 0 / 8px 8px';
            const thumbCanvas = document.createElement('canvas');
            thumbCanvas.width = 32;
            thumbCanvas.height = 32;
            thumbCanvas.style.position = 'absolute';
            thumbCanvas.style.top = '0';
            thumbCanvas.style.left = '0';
            thumbCanvas.style.width = '100%';
            thumbCanvas.style.height = '100%';
            thumbCanvas.getContext('2d').drawImage(layer.canvas, 0, 0, 32, 32);
            thumb.appendChild(thumbCanvas);

            const visBtn = document.createElement('button');
            visBtn.className = 'layer-visibility' + (layer.visible ? '' : ' layer-visibility--hidden');
            visBtn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            visBtn.addEventListener('pointerdown', function(e) {
                e.stopPropagation();
                toggleLayerVisibility(i);
            });

            const info = document.createElement('div');
            info.className = 'layer-info';
            const sliderId = 'layerOpacitySlider' + i;
            info.innerHTML = '<div class="layer-name">' + escapeHTML(layer.name) + '</div>' +
                '<input type="range" class="layer-opacity-slider" id="' + sliderId + '" data-layer="' + i + '" min="0" max="100" value="' + Math.round(layer.opacity * 100) + '">';
            const opacitySlider = info.querySelector('.layer-opacity-slider');
            opacitySlider.addEventListener('input', function(e) {
                setLayerOpacity(i, parseInt(e.target.value));
            });

            item.addEventListener('dragstart', function(e) {
                item.classList.add('layer-item--dragging');
                e.dataTransfer.setData('text/plain', i.toString());
                e.dataTransfer.effectAllowed = 'move';
            });
            item.addEventListener('dragend', function() {
                item.classList.remove('layer-item--dragging');
            });
            item.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
            });
            item.addEventListener('drop', function(e) {
                e.preventDefault();
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const toIndex = parseInt(e.currentTarget.dataset.index);
                if (fromIndex !== toIndex) {
                    state.hasUnsavedChanges = true;
                    reorderLayers(fromIndex, toIndex);
                }
            });

            item.addEventListener('pointerdown', function(e) {
                if (e.target.closest('.layer-visibility') || e.target.closest('.layer-opacity-slider')) return;
                state.activeLayerIndex = i;
                state.hasUnsavedChanges = true;
                renderAll();
            });

            item.appendChild(thumb);
            item.appendChild(visBtn);
            item.appendChild(info);
            layerList.appendChild(item);
        }
    }

    function escapeHTML(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderHistoryList() {
        historyList.innerHTML = '';
        $('#historyCount').textContent = state.history.length;

        state.history.forEach(function(entry, i) {
            const item = document.createElement('div');
            item.className = 'history-entry' +
                (i === state.historyIndex ? ' history-entry--active' : ' history-entry--past');
            item.innerHTML = '<span class="history-entry__label">' + escapeHTML(entry.label) + '</span>';
            item.addEventListener('pointerdown', function() {
                state.historyIndex = i;
                restoreHistory();
            });
            historyList.appendChild(item);
        });

        historyList.scrollTop = historyList.scrollHeight;
    }

    function updateStatusMetrics() {
        $('#statusLayers').textContent = state.layers.length;
        $('#statusZoom').textContent = Math.round(state.zoom * 100) + '%';
        $('#statusTool').textContent = TOOL_NAMES[state.activeTool];
        updateUnsavedIndicator();
    }

    function updateUnsavedIndicator() {
        const indicator = $('#unsavedIndicator');
        indicator.classList.toggle('visible', state.hasUnsavedChanges);
    }

    function updateSelectionOverlay() {
        const overlay = $('#selectionOverlay');
        if (!state.selection || state.selection.minX === undefined) {
            overlay.classList.remove('visible');
            return;
        }
        const s = state.selection;
        overlay.style.left = (s.minX * state.zoom + state.panX + 18) + 'px';
        overlay.style.top = (s.minY * state.zoom + state.panY + 18) + 'px';
        overlay.style.width = ((s.maxX - s.minX + 1) * state.zoom) + 'px';
        overlay.style.height = ((s.maxY - s.minY + 1) * state.zoom) + 'px';
        overlay.classList.add('visible');
    }

    // === ZOOM / PAN ===
    function fitToWindow() {
        const workspace = canvasWorkspace;
        const rect = workspace.getBoundingClientRect();
        const contentW = state.documentWidth + 36;
        const contentH = state.documentHeight + 36;
        const zoomX = (rect.width - 36) / contentW;
        const zoomY = (rect.height - 36) / contentH;
        state.zoom = Math.min(zoomX, zoomY, 1);
        state.zoom = Math.max(0.1, Math.min(5.0, state.zoom));
        state.panX = (rect.width - contentW * state.zoom) / 2 - 18;
        state.panY = (rect.height - contentH * state.zoom) / 2 - 18;
        renderAll();
    }

    function zoomTo(zoomTarget, centerX, centerY) {
        const prevZoom = state.zoom;
        state.zoom = Math.max(0.1, Math.min(5.0, zoomTarget));

        if (centerX !== undefined && centerY !== undefined) {
            const rect = canvasWorkspace.getBoundingClientRect();
            const docX = (centerX - 18 - state.panX) / prevZoom;
            const docY = (centerY - 18 - state.panY) / prevZoom;
            state.panX = centerX - 18 - docX * state.zoom;
            state.panY = centerY - 18 - docY * state.zoom;
        }

        renderAll();
    }

    // === FILE I/O ===
    function openFile(file) {
        const reader = new FileReader();
        const ext = file.name.split('.').pop().toLowerCase();

        if (ext === 'pixelforge' || ext === 'json') {
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (data.layers) {
                        restoreFromJSON(data);
                        state.documentName = data.documentName || file.name.replace(/\.[^.]+$/, '');
                        $('#docName').textContent = state.documentName;
                        updateUnsavedIndicator();
                        renderAll();
                        showToast('Document loaded', 'success');
                    }
                } catch (err) {
                    showToast('Failed to load file', 'error');
                }
            };
            reader.readAsText(file);
        } else if (ext === 'png' || ext === 'jpeg' || ext === 'jpg' || ext === 'gif') {
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    newDocument(img.width, img.height);
                    const layer = getActiveLayer();
                    layer.canvas.getContext('2d').drawImage(img, 0, 0);
                    state.documentName = file.name.replace(/\.[^.]+$/, '');
                    $('#docName').textContent = state.documentName;
                    updateUnsavedIndicator();
                    renderAll();
                    showToast('Image loaded', 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    function restoreFromJSON(data) {
        state.layers = [];
        state.documentWidth = data.width || 800;
        state.documentHeight = data.height || 600;
        state.documentName = data.documentName || 'Untitled';

        data.layers.forEach(function(lData, i) {
            const layer = createLayer(lData.name, state.documentWidth, state.documentHeight);
            layer.visible = lData.visible !== undefined ? lData.visible : true;
            layer.opacity = lData.opacity !== undefined ? lData.opacity : 1.0;
            const ctx = layer.canvas.getContext('2d');
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0);
                renderAll();
            };
            img.src = lData.imageData;
            state.layers.push(layer);
        });

        state.activeLayerIndex = Math.min(data.activeLayerIndex || 0, state.layers.length - 1);
        saveHistory('Load Document');
    }

    function saveFile() {
        var data = {
            version: '1.0',
            documentName: state.documentName,
            width: state.documentWidth,
            height: state.documentHeight,
            layers: state.layers.map(function(l) {
                return {
                    name: l.name,
                    visible: l.visible,
                    opacity: l.opacity,
                    width: l.canvas.width,
                    height: l.canvas.height,
                    imageData: l.canvas.toDataURL('image/png')
                };
            })
        };
        var json = JSON.stringify(data, null, 2);
        downloadFile(json, state.documentName + '.pixelforge', 'application/json');
        state.hasUnsavedChanges = false;
        updateUnsavedIndicator();
        showToast('Document saved', 'success');
        try {
            localStorage.setItem('pixelforge-autosave', json);
        } catch(e) {
            // ignore
        }
    }

    function exportImage(format) {
        var exportCanvas = document.createElement('canvas');
        exportCanvas.width = state.documentWidth;
        exportCanvas.height = state.documentHeight;
        var ctx = exportCanvas.getContext('2d');

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

        state.layers.forEach(function(l) {
            if (l.visible) {
                ctx.globalAlpha = l.opacity;
                ctx.drawImage(l.canvas, 0, 0);
            }
        });
        ctx.globalAlpha = 1.0;

        var mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
        var quality = undefined;
        if (format === 'jpeg') {
            quality = $('#jpegQuality').value / 100;
        }
        var dataURL = exportCanvas.toDataURL(mimeType, quality);
        var ext = format === 'jpeg' ? 'jpg' : 'png';
        downloadFile(dataURL, state.documentName + '.' + ext, mimeType);
        showToast('Exported as ' + ext.toUpperCase(), 'success');
    }

    function downloadFile(content, filename, mimeType) {
        var a = document.createElement('a');
        a.href = content.startsWith('data:') ? content : 'data:' + mimeType + ',' + encodeURIComponent(content);
        a.download = filename;
        a.click();
    }

    // === TEXT TOOL ===
    function handleTextTool(clientX, clientY) {
        var coords = getCanvasCoords(clientX, clientY);

        var existing = document.getElementById('textOverlay');
        if (existing) existing.remove();

        var fontSize = Math.max(14, state.brushSize);
        var input = document.createElement('div');
        input.id = 'textOverlay';
        input.className = 'text-input-overlay';
        input.contentEditable = 'true';
        // Position relative to canvasWorkspace (its containing block) — do NOT add rect.left/top
        input.style.left = (coords.x * state.zoom + 18 + state.panX) + 'px';
        input.style.top  = (coords.y * state.zoom + 18 + state.panY) + 'px';
        input.style.fontFamily = 'var(--font-body)';
        input.style.fontSize   = fontSize + 'px';
        input.style.color      = state.fgColor;
        input.dataset.placeholder = 'true';
        input.textContent = 'Type text…';

        canvasWorkspace.appendChild(input);

        // Select-all placeholder on first focus so typing replaces it
        input.addEventListener('focus', function() {
            if (input.dataset.placeholder === 'true') {
                var sel = window.getSelection();
                var range = document.createRange();
                range.selectNodeContents(input);
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }, { once: true });
        input.addEventListener('input', function() {
            input.dataset.placeholder = 'false';
        });

        // Small delay so the pointerdown that spawned this doesn't immediately blur the overlay
        setTimeout(function() { input.focus(); }, 0);

        var committed = false;
        var commitText = function() {
            if (committed) return;
            committed = true;
            var text = (input.dataset.placeholder === 'true')
                ? ''
                : input.innerText.trim();
            input.remove();
            if (!text) return;
            var layer = getActiveLayer();
            if (!layer) return;
            var ctx = layer.canvas.getContext('2d');
            ctx.save();
            ctx.fillStyle = state.fgColor;
            ctx.font = fontSize + 'px var(--font-body)';
            ctx.textBaseline = 'top';
            var lines = text.split('\n');
            lines.forEach(function(line, i) {
                ctx.fillText(line, coords.x, coords.y + i * fontSize * 1.3);
            });
            ctx.restore();
            state.hasUnsavedChanges = true;
            saveHistory('Text');
            renderAll();
            showToast('Text added', 'success');
        };

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                commitText();
            }
            if (e.key === 'Escape') {
                committed = true;
                input.remove();
            }
        });
        input.addEventListener('blur', function() {
            setTimeout(commitText, 150);
        });
    }

    // === MARQUEE / LASSO / CROP ===
    function updateSelectionOverlayLive() {
        const overlay = $('#selectionOverlay');
        if (state.marqueePoints.length >= 2) {
            const p0 = state.marqueePoints[0];
            const p1 = state.marqueePoints[state.marqueePoints.length - 1];
            const minX = Math.min(p0.x, p1.x);
            const minY = Math.min(p0.y, p1.y);
            const w = Math.abs(p1.x - p0.x);
            const h = Math.abs(p1.y - p0.y);
            overlay.style.left = (minX * state.zoom + state.panX + 18) + 'px';
            overlay.style.top = (minY * state.zoom + state.panY + 18) + 'px';
            overlay.style.width = (w * state.zoom) + 'px';
            overlay.style.height = (h * state.zoom) + 'px';
            overlay.style.border = '1px dashed var(--color-primary)';
            overlay.style.background = 'none';
            overlay.style.opacity = '1';
            overlay.classList.add('visible');
        }
    }

    function commitMarquee() {
        if (state.marqueePoints.length >= 2) {
            var p0 = state.marqueePoints[0];
            var p1 = state.marqueePoints[state.marqueePoints.length - 1];
            state.selection = {
                minX: Math.min(p0.x, p1.x),
                minY: Math.min(p0.y, p1.y),
                maxX: Math.max(p0.x, p1.x),
                maxY: Math.max(p0.y, p1.y)
            };
            updateSelectionOverlay();
            updateStatusMetrics();
        }
        state.marqueePoints = [];
    }

    function commitLasso() {
        if (state.lassoPoints.length >= 3) {
            var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            var points = [];
            state.lassoPoints.forEach(function(p) {
                if (p.x < minX) minX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.x > maxX) maxX = p.x;
                if (p.y > maxY) maxY = p.y;
                points.push({ x: p.x, y: p.y });
            });
            // Keep both the polygon (for clipping) and the bbox (for overlay/copy/delete fast-path).
            state.selection = {
                minX: minX,
                minY: minY,
                maxX: maxX,
                maxY: maxY,
                points: points
            };
            updateSelectionOverlay();
            updateStatusMetrics();
        }
        state.lassoPoints = [];
    }

    function commitCrop() {
        var sX = Math.min(state.cropStartX, state.cropEndX);
        var sY = Math.min(state.cropStartY, state.cropEndY);
        var w = Math.abs(state.cropEndX - state.cropStartX);
        var h = Math.abs(state.cropEndY - state.cropStartY);

        if (w < 2 || h < 2) {
            $('#cropOverlay').classList.remove('visible');
            return;
        }

        state.layers.forEach(function(layer) {
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            var tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(layer.canvas, sX, sY, w, h, 0, 0, w, h);
            layer.canvas.width = w;
            layer.canvas.height = h;
            layer.canvas.getContext('2d').drawImage(tempCanvas, 0, 0);
        });

        state.documentWidth = w;
        state.documentHeight = h;
        state.cropStartX = 0;
        state.cropStartY = 0;
        state.cropEndX = 0;
        state.cropEndY = 0;
        state.hasUnsavedChanges = true;
        saveHistory('Crop');
        $('#cropOverlay').classList.remove('visible');
        renderAll();
    }

    // === SELECTION OPERATIONS ===
    function getSelectionRect() {
        var s = state.selection;
        if (!s || s.minX === undefined) return null;
        return {
            x: s.minX,
            y: s.minY,
            w: s.maxX - s.minX + 1,
            h: s.maxY - s.minY + 1
        };
    }

    function deleteSelectionPixels() {
        var r = getSelectionRect();
        if (!r) return;
        var layer = getActiveLayer();
        if (!layer) return;
        saveHistory('Delete selection');
        layer.canvas.getContext('2d').clearRect(r.x, r.y, r.w, r.h);
        state.hasUnsavedChanges = true;
        renderAll();
    }

    function copySelectionPixels(cut) {
        var r = getSelectionRect();
        if (!r) return;
        var layer = getActiveLayer();
        if (!layer) return;
        var tmp = document.createElement('canvas');
        tmp.width = r.w; tmp.height = r.h;
        tmp.getContext('2d').drawImage(layer.canvas, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);
        state.clipboard = { canvas: tmp, w: r.w, h: r.h };
        if (cut) {
            saveHistory('Cut selection');
            layer.canvas.getContext('2d').clearRect(r.x, r.y, r.w, r.h);
            state.hasUnsavedChanges = true;
            renderAll();
        }
        showToast(cut ? 'Cut to clipboard' : 'Copied to clipboard', 'success');
    }

    function pasteClipboard() {
        if (!state.clipboard) return;
        var layer = getActiveLayer();
        if (!layer) return;
        saveHistory('Paste');
        // Paste at centre of current view
        var cx = Math.round((state.documentWidth  - state.clipboard.w) / 2);
        var cy = Math.round((state.documentHeight - state.clipboard.h) / 2);
        layer.canvas.getContext('2d').drawImage(state.clipboard.canvas, cx, cy);
        state.hasUnsavedChanges = true;
        renderAll();
        showToast('Pasted', 'success');
    }

    function deselectAll() {
        state.selection = null;
        state.marqueePoints = [];
        state.lassoPoints = [];
        updateSelectionOverlay();
        updateStatusMetrics();
    }

    // === MULTI-TOUCH GESTURES (pinch-zoom + two-finger pan) ===
    // Tracks active pointers on canvasWorkspace. When >=2 are down we drop into
    // gesture mode, cancel any in-progress single-touch draw, and translate the
    // pinch/pan into zoom + pan deltas. Returning to <2 pointers exits gesture
    // mode without resuming the cancelled stroke (avoids drawing during release).
    const _gesture = {
        pointers: new Map(),   // pointerId -> {x, y}
        active: false,
        startDist: 0,
        startMidX: 0,
        startMidY: 0,
        startZoom: 1,
        startPanX: 0,
        startPanY: 0,
    };
    function _gestureMid() {
        let sx = 0, sy = 0, n = 0;
        _gesture.pointers.forEach(p => { sx += p.x; sy += p.y; n++; });
        return { x: sx / n, y: sy / n };
    }
    function _gestureDist() {
        const arr = Array.from(_gesture.pointers.values());
        if (arr.length < 2) return 0;
        const dx = arr[0].x - arr[1].x;
        const dy = arr[0].y - arr[1].y;
        return Math.hypot(dx, dy);
    }
    function _enterGesture() {
        // Abort any in-progress single-touch draw/select before zooming.
        state.isDrawing = false;
        state.isSelecting = false;
        state.isPanning = false;
        _gesture.active = true;
        _gesture.startDist = _gestureDist();
        const mid = _gestureMid();
        _gesture.startMidX = mid.x;
        _gesture.startMidY = mid.y;
        _gesture.startZoom = state.zoom;
        _gesture.startPanX = state.panX;
        _gesture.startPanY = state.panY;
    }
    function _updateGesture() {
        const dist = _gestureDist();
        if (dist <= 0 || _gesture.startDist <= 0) return;
        const scale = dist / _gesture.startDist;
        const newZoom = Math.max(0.1, Math.min(5.0, _gesture.startZoom * scale));
        const mid = _gestureMid();
        const rect = canvasWorkspace.getBoundingClientRect();
        // Keep the pinch midpoint stable on the document: pan compensates for zoom-around-midpoint
        const localMidX = _gesture.startMidX - rect.left;
        const localMidY = _gesture.startMidY - rect.top;
        const docMidX = (localMidX - 18 - _gesture.startPanX) / _gesture.startZoom;
        const docMidY = (localMidY - 18 - _gesture.startPanY) / _gesture.startZoom;
        // New pan such that docMid stays under the *current* mid finger position
        const curLocalMidX = mid.x - rect.left;
        const curLocalMidY = mid.y - rect.top;
        state.zoom = newZoom;
        state.panX = curLocalMidX - 18 - docMidX * newZoom;
        state.panY = curLocalMidY - 18 - docMidY * newZoom;
        renderAll();
    }

    // === POINTER EVENTS ===
    function onPointerDown(e) {
        // Track all pointers for multi-touch gestures
        _gesture.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        if (_gesture.pointers.size >= 2 && !_gesture.active) {
            e.preventDefault();
            _enterGesture();
            try { e.target.setPointerCapture(e.pointerId); } catch (_) {}
            return;
        }
        if (_gesture.active) {
            // Additional touchpoint while already gesturing — recompute baseline
            _enterGesture();
            return;
        }
        // Middle mouse or space+drag for pan
        if (e.button === 1 || (state.isSpacePressed && state.spaceDownTime > 0)) {
            e.preventDefault();
            state.isPanning = true;
            state.panStartX = e.clientX;
            state.panStartY = e.clientY;
            state.panOffsetStartX = state.panX;
            state.panOffsetStartY = state.panY;
            canvasWorkspace.style.cursor = 'grabbing';
            e.target.setPointerCapture(e.pointerId);
            return;
        }

        if (e.button !== 0) return;

        // Move tool — start canvas pan on left-click drag
        if (state.activeTool === 'move') {
            e.preventDefault();
            state.isPanning = true;
            state.panStartX = e.clientX;
            state.panStartY = e.clientY;
            state.panOffsetStartX = state.panX;
            state.panOffsetStartY = state.panY;
            canvasWorkspace.style.cursor = 'grabbing';
            e.target.setPointerCapture(e.pointerId);
            return;
        }

        state.isDrawing = true;
        state.lastPointerX = e.clientX;
        state.lastPointerY = e.clientY;

        var coords = getCanvasCoords(e.clientX, e.clientY);
        state.drawStartX = coords.x;
        state.drawStartY = coords.y;

        if (state.eyedropperMode) {
            // FIX MAJ-001: Sample directly from active layer canvas to avoid CSS checkerboard contamination
            const layer = getActiveLayer();
            if (layer) {
                const layerCtx = layer.canvas.getContext('2d');
                const c = getColorAt(layerCtx, coords.x, coords.y);
                if (c) {
                    setFGColor(rgbToHex(c.r, c.g, c.b));
                    showToast('Picked ' + rgbToHex(c.r, c.g, c.b), 'info');
                }
            }
            state.isDrawing = false;
            return;
        }

        if (state.activeTool === 'fill' || state.activeTool === 'wand') {
            if (state.activeTool === 'fill') {
                floodFill(coords.x, coords.y);
                state.hasUnsavedChanges = true;
                saveHistory('Fill');
                renderAll();
            } else {
                selectWithMagicWand(coords.x, coords.y);
                renderAll();
            }
            state.isDrawing = false;
            return;
        }

        if (state.activeTool === 'text') {
            handleTextTool(e.clientX, e.clientY);
            state.isDrawing = false;
            return;
        }

        if (state.activeTool === 'marquee' || state.activeTool === 'lasso') {
            state.isDrawing = false;  // selection tools use isSelecting, not isDrawing
            state.marqueePoints = [coords];
            state.lassoPoints = [coords];
            state.isSelecting = true;
            e.target.setPointerCapture(e.pointerId);
            return;
        }

        if (state.activeTool === 'crop') {
            state.isDrawing = false;
            state.cropStartX = coords.x;
            state.cropStartY = coords.y;
            state.cropEndX = coords.x;
            state.cropEndY = coords.y;
            state.isSelecting = true;
            e.target.setPointerCapture(e.pointerId);
            return;
        }

        // Drawing tools
        e.target.setPointerCapture(e.pointerId);
        applyBrush(coords.x, coords.y);
    }

    function onPointerMove(e) {
        // Update tracked pointer position for gestures
        if (_gesture.pointers.has(e.pointerId)) {
            _gesture.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
        }
        if (_gesture.active) {
            e.preventDefault();
            _updateGesture();
            return;
        }
        // Update status metrics with throttling
        if (!state._rafPending) {
            state._rafPending = true;
            requestAnimationFrame(function() {
                var coords = getCanvasCoords(e.clientX, e.clientY);
                $('#statusX').textContent = coords.x;
                $('#statusY').textContent = coords.y;
                state._rafPending = false;
            });
        }

        if (state.isPanning) {
            state.panX = state.panOffsetStartX + (e.clientX - state.panStartX);
            state.panY = state.panOffsetStartY + (e.clientY - state.panStartY);
            renderAll();
            return;
        }

        if (!state.isDrawing && !state.isSelecting) return;

        var coords = getCanvasCoords(e.clientX, e.clientY);

        if (state.activeTool === 'brush' || state.activeTool === 'pencil' || state.activeTool === 'eraser' || state.activeTool === 'spray') {
            applyBrush(coords.x, coords.y);
            state.hasUnsavedChanges = true;
            renderAll();
            return;
        }

        if (state.activeTool === 'marquee' || state.activeTool === 'lasso') {
            if (state.activeTool === 'marquee') {
                state.marqueePoints.push(coords);
            }
            state.lassoPoints.push(coords);
            updateSelectionOverlayLive();
            if (state.marqueePoints.length >= 2) {
                var startX = state.marqueePoints[0].x;
                var startY = state.marqueePoints[0].y;
                $('#statusW').textContent = Math.abs(coords.x - startX);
                $('#statusH').textContent = Math.abs(coords.y - startY);
                $('#selectionMetrics').style.display = 'flex';
            }
            return;
        }

        if (state.activeTool === 'crop') {
            state.cropEndX = coords.x;
            state.cropEndY = coords.y;
            var overlay = $('#cropOverlay');
            if (state.isSelecting) {
                var sX = Math.min(state.cropStartX, state.cropEndX);
                var sY = Math.min(state.cropStartY, state.cropEndY);
                var w = Math.abs(state.cropEndX - state.cropStartX);
                var h = Math.abs(state.cropEndY - state.cropStartY);
                overlay.innerHTML = '<div style="position:absolute;inset:0;background:rgba(15,15,19,0.85);"></div>' +
                    '<div style="position:absolute;left:' + (sX * state.zoom) + 'px;top:' + (sY * state.zoom) + 'px;width:' + (w * state.zoom) + 'px;height:' + (h * state.zoom) + 'px;background:transparent;border:2px solid var(--color-primary);z-index:10;"></div>';
                overlay.classList.add('visible');
                $('#statusW').textContent = w;
                $('#statusH').textContent = h;
                $('#selectionMetrics').style.display = 'flex';
            }
            return;
        }
    }

    function onPointerUp(e) {
        // Remove from gesture tracking
        _gesture.pointers.delete(e.pointerId);
        if (_gesture.active) {
            if (_gesture.pointers.size < 2) {
                // Exit gesture mode; suppress any pending draw fallthrough
                _gesture.active = false;
                state.isDrawing = false;
                state.isSelecting = false;
            }
            return;
        }
        if (state.isPanning) {
            state.isPanning = false;
            updateCursor();
            return;
        }

        if (state.isDrawing) {
            var toolsThatNeedHistory = ['brush', 'pencil', 'eraser', 'spray'];
            if (toolsThatNeedHistory.indexOf(state.activeTool) !== -1) {
                state.hasUnsavedChanges = true;
                saveHistory(TOOL_NAMES[state.activeTool] + ' stroke');
                renderAll();
            }
            state.isDrawing = false;
            return;
        }

        if (state.activeTool === 'marquee') {
            commitMarquee();
        }

        if (state.activeTool === 'lasso') {
            commitLasso();
        }

        if (state.activeTool === 'crop') {
            commitCrop();
        }

        state.isDrawing = false;
        state.isSelecting = false;
    }

    function onWheel(e) {
        e.preventDefault();

        if (e.ctrlKey || e.metaKey) {
            var rect = canvasWorkspace.getBoundingClientRect();
            var centerX = e.clientX - rect.left;
            var centerY = e.clientY - rect.top;
            var zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
            zoomTo(state.zoom * zoomFactor, centerX, centerY);
        } else {
            state.panX -= e.deltaX;
            state.panY -= e.deltaY;
            renderAll();
        }
    }

    function onKeyDown(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
            if (e.key === 'Escape') {
                e.target.blur();
            }
            return;
        }

        var key = e.key.toLowerCase();

        // Tool shortcuts
        if (Object.values(TOOL_SHORTCUTS).includes(key.toUpperCase()) && !e.ctrlKey && !e.metaKey) {
            var toolKey = Object.keys(TOOL_SHORTCUTS).find(function(k) { return TOOL_SHORTCUTS[k] === key.toUpperCase(); });
            if (toolKey) {
                setTool(toolKey);
                e.preventDefault();
            }
        }

        // Grid toggle with G when not ctrl
        if (key === 'g' && !e.ctrlKey && !e.metaKey) {
            state.showGrid = !state.showGrid;
            $('#gridOverlay').classList.toggle('visible', state.showGrid);
            showToast(state.showGrid ? 'Grid on' : 'Grid off', 'info');
            e.preventDefault();
        }

        // FIX MAJ-002: Bracket shortcuts for brush size
        if (key === '[') {
            state.brushSize = Math.max(1, state.brushSize - 1);
            $('#brushSize').value = state.brushSize;
            $('#brushSizeVal').textContent = state.brushSize;
            e.preventDefault();
        } else if (key === ']') {
            state.brushSize = Math.min(200, state.brushSize + 1);
            $('#brushSize').value = state.brushSize;
            $('#brushSizeVal').textContent = state.brushSize;
            e.preventDefault();
        }

        // Delete / Backspace — clear selection pixels
        if ((key === 'Delete' || key === 'Backspace') && state.selection && !e.target.isContentEditable) {
            deleteSelectionPixels();
            e.preventDefault();
        }

        // Escape — deselect
        if (key === 'Escape' && state.selection) {
            deselectAll();
            e.preventDefault();
        }

        // Ctrl shortcuts
        if (e.ctrlKey || e.metaKey) {
            switch (key) {
                case 'z':
                    if (e.shiftKey) {
                        redo();
                    } else {
                        undo();
                    }
                    e.preventDefault();
                    break;
                case 's':
                    saveFile();
                    e.preventDefault();
                    break;
                case 'o':
                    $('#fileInput').click();
                    e.preventDefault();
                    break;
                case 'n':
                    $('#modalNew').classList.add('visible');
                    e.preventDefault();
                    break;
                case '0':
                    fitToWindow();
                    e.preventDefault();
                    break;
                case '=':
                case '+':
                    zoomTo(state.zoom * 1.2);
                    e.preventDefault();
                    break;
                case '-':
                    zoomTo(state.zoom / 1.2);
                    e.preventDefault();
                    break;
                case 'x':
                    if (!e.target.isContentEditable) { copySelectionPixels(true); e.preventDefault(); }
                    break;
                case 'c':
                    if (!e.target.isContentEditable) { copySelectionPixels(false); e.preventDefault(); }
                    break;
                case 'v':
                    if (!e.target.isContentEditable) { pasteClipboard(); e.preventDefault(); }
                    break;
                case 'd':
                    deselectAll();
                    e.preventDefault();
                    break;
            }
        }

        // Space for pan
        if (key === ' ') {
            state.isSpacePressed = true;
            state.spaceDownTime = Date.now();
            canvasWorkspace.style.cursor = 'grab';
            e.preventDefault();
        }
    }

    function onKeyUp(e) {
        if (e.key === ' ') {
            state.isSpacePressed = false;
            state.spaceDownTime = 0;
            updateCursor();
        }
    }

    // === UTILITIES ===
    function showToast(message, type) {
        type = type || 'info';
        var container = $('#toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast toast--' + type;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(function() {
            if (toast.parentNode) toast.remove();
        }, 3000);
    }

    function buildMobileToolbar() {
        var toolbar = $('#mobileToolbar');
        var tools = ['move', 'brush', 'pencil', 'eraser', 'spray', 'fill', 'text', 'marquee', 'lasso', 'wand', 'crop'];
        var icons = {
            move: '<path d="M5 9l-3 3 3 3"/><path d="M9 5l3-3 3 3"/><path d="M15 19l-3 3-3-3"/><path d="M19 9l3 3-3 3"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/>',
            brush: '<path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>',
            pencil: '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
            eraser: '<path d="M20 20H7L3 16l9-9 8 8-4 4z"/><path d="M6.5 13.5l5 5"/>',
            spray: '<circle cx="16" cy="4" r="1"/><circle cx="18" cy="7" r="1"/><circle cx="14" cy="6" r="1"/><circle cx="19" cy="10" r="1"/><circle cx="15" cy="9" r="1"/><path d="M8 20l-4-4"/><path d="M4 16l3-3"/><path d="M14 12l-6 6"/>',
            fill: '<path d="M2 22l1-1h3l9-9"/><path d="M3 21V3l18 18"/><path d="M19 13c1.5 1.5 2 3.5 1 5s-3 2-5 1"/><path d="M15 17c-1 1-3 1-5 0"/><path d="M14 11l-6 6"/>',
            text: '<polyline points="4 7 4 4 20 4 20 7"/><line x1="9.5" y1="20" x2="14.5" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>',
            marquee: '<rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 2"/><path d="M3 3l4 4"/><path d="M21 3l-4 4"/><path d="M3 21l4-4"/><path d="M21 21l-4-4"/>',
            lasso: '<path d="M12 2c-5 0-9 4-9 9s4 11 9 11 9-6 9-9-4-11-9-11z" stroke-dasharray="3 2"/><circle cx="12" cy="12" r="2"/>',
            wand: '<path d="M14.5 2L22 9.5"/><path d="M14.5 2L19 2"/><path d="M22 9.5L19 6"/><path d="M8 22l2-7"/><path d="M5 15l7-1 4 4"/><path d="M12 2l1 7"/><circle cx="5" cy="5" r="1"/><circle cx="19" cy="19" r="1"/>',
            crop: '<path d="M6 2v4H2"/><path d="M6 22v-4H2"/><path d="M18 2v4h4"/><path d="M18 22v-4h4"/><path d="M2 6h4"/><path d="M2 18h4"/><path d="M18 6h4"/><path d="M18 18h4"/>'
        };

        tools.forEach(function(tool) {
            var btn = document.createElement('button');
            btn.className = 'tool-btn';
            btn.dataset.tool = tool;
            btn.dataset.tooltip = TOOL_NAMES[tool] + ' (' + TOOL_SHORTCUTS[tool] + ')';
            btn.setAttribute('aria-label', TOOL_NAMES[tool] + ' tool (' + TOOL_SHORTCUTS[tool] + ')');
            btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;">' + (icons[tool] || '') + '</svg><span class="tool-btn__shortcut">' + TOOL_SHORTCUTS[tool] + '</span>';
            btn.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                setTool(tool);
            });
            toolbar.appendChild(btn);
        });
    }

    // === START ===
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

<!-- Tool-rail tooltip (body-level to escape overflow:hidden clipping) -->
<div id="pf-tooltip"></div>
<script>
(function() {
    var tip = document.getElementById('pf-tooltip');
    var showTimer;
    document.querySelectorAll('[data-tooltip]').forEach(function(el) {
        el.addEventListener('mouseenter', function(e) {
            clearTimeout(showTimer);
            showTimer = setTimeout(function() {
                var text = el.getAttribute('data-tooltip');
                tip.textContent = text;
                var r = el.getBoundingClientRect();
                var x = r.right + 8;
                var y = r.top + r.height / 2;
                // keep inside viewport
                tip.style.left = x + 'px';
                tip.style.top = y + 'px';
                tip.style.transform = 'translateY(-50%)';
                tip.classList.add('visible');
            }, 120);
        });
        el.addEventListener('mouseleave', function() {
            clearTimeout(showTimer);
            tip.classList.remove('visible');
        });
    });
})();
</script>
